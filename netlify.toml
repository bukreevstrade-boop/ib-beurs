[build]
  command = "npm run build"
  publish = "dist"

# Vite emits content-hashed files in /assets — safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML must always revalidate so new asset hashes are picked up immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
